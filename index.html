<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Aida Beauty</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
margin:0;
background:#fff9f8;
}

header{
background:#ff8fab;
color:white;
padding:20px;
text-align:center;
}

nav{
background:#ffeaea;
padding:10px;
text-align:center;
}

nav button{
padding:10px;
margin:5px;
border:none;
background:#c0392b;
color:white;
cursor:pointer;
}

.products{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
justify-content:center;
}

.card{
background:white;
width:200px;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

button{
padding:8px;
border:none;
background:#25D366;
color:white;
cursor:pointer;
margin-top:5px;
}

#adminPanel{
display:none;
background:white;
padding:20px;
position:fixed;
top:10%;
left:50%;
transform:translateX(-50%);
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<header>
<h1>Aida Beauty</h1>
<p>Mode & Beauté moderne inspirée d'Afrique</p>
</header>

<nav>
<button onclick="showCategory('femme')">Femme</button>
<button onclick="showCategory('homme')">Homme</button>
<button onclick="showCategory('beaute')">Beauté</button>
<button onclick="openAdmin()">Admin</button>
</nav>

<div class="products" id="products"></div>

<!-- ADMIN -->

<div id="adminPanel">

<h3>Admin</h3>

<input id="password" type="password" placeholder="mot de passe">

<button onclick="login()">Entrer</button>

<div id="adminArea" style="display:none">

<h4>Ajouter produit</h4>

<input id="name" placeholder="Nom"><br><br>

<input id="price" placeholder="Prix"><br><br>

<select id="category">
<option value="femme">Femme</option>
<option value="homme">Homme</option>
<option value="beaute">Beauté</option>
</select><br><br>

<input type="file" id="image"><br><br>

<button onclick="addProduct()">Ajouter</button>

</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let category="femme";

function save(){

localStorage.setItem("products",JSON.stringify(products));

render();

}

function render(){

let container=document.getElementById("products");

container.innerHTML="";

products.filter(p=>p.category==category).forEach((p,i)=>{

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${p.image}">

<h4>${p.name}</h4>

<p>${p.price} FCFA</p>

<button onclick="order('${p.name}',${p.price})">Commander</button>

<button onclick="removeProduct(${i})" style="background:red">Supprimer</button>

`;

container.appendChild(card);

});

}

function showCategory(cat){

category=cat;

render();

}

function order(name,price){

let phone="221770000000";

let text=`Bonjour je veux commander ${name} - ${price} FCFA`;

window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`);

}

function removeProduct(i){

products.splice(i,1);

save();

}

function openAdmin(){

document.getElementById("adminPanel").style.display="block";

}

function login(){

if(document.getElementById("password").value=="aidasecret"){

document.getElementById("adminArea").style.display="block";

}

else{

alert("Mot de passe incorrect");

}

}

function addProduct(){

let name=document.getElementById("name").value;

let price=document.getElementById("price").value;

let category=document.getElementById("category").value;

let file=document.getElementById("image").files[0];

let reader=new FileReader();

reader.onload=function(e){

products.push({

name,

price,

category,

image:e.target.result

});

save();

};

reader.readAsDataURL(file);

}

render();

</script>

</body>
</html>
